services:
  grafana:
    image: grafana/grafana:11.6.0
    expose:
      - "3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./dashboards:/var/lib/grafana/dashboards
    depends_on:
      - loki
      - mimir
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./config/loki-config.yml:/etc/loki/config.yml
      - loki-data:/loki
    restart: unless-stopped

  mimir:
    image: grafana/mimir:2.15.0
    ports:
      - "9009:9009"
    command:
      - -config.file=/etc/mimir/config.yml
      - -target=all
      - -server.http-listen-port=9009
    volumes:
      - ./config/mimir-config.yml:/etc/mimir/config.yml
      - mimir-data:/data
    restart: unless-stopped

  alloy:
    image: grafana/alloy:latest
    ports:
      - "12345:12345"
    volumes:
      - ./config/alloy-config.alloy:/etc/alloy/config.alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    depends_on:
      - mimir
    restart: unless-stopped

  openrescue-web:
    build: ../web
    ports:
      - "3001:3000"
    environment:
      - GRAFANA_URL=http://grafana:3000
      - DATABASE_PATH=/data/settings.db
      - TAILSCALE_AUTH_ENABLED=${TAILSCALE_AUTH_ENABLED:-false}
    volumes:
      - web-data:/data
    depends_on:
      - grafana
    restart: unless-stopped

volumes:
  grafana-data:
  loki-data:
  mimir-data:
  web-data:
