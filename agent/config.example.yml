# agent/config.example.yml
server:
  loki_url: "http://your-server-ip:3100"
  mimir_url: "http://your-server-ip:9009"

tracking:
  poll_interval_seconds: 5
  idle_threshold_seconds: 300

projects:
  base_paths:
    - "~/projects"
    - "~/work"

# Categories use a 5-level productivity scale.
# Default rules are loaded from default_categories.yml.
# Specifying a level here REPLACES the defaults for that level.
# Omit a level to keep its defaults.
categories:
  very_productive:
    - "code"
    - "terminal"
    - "neovim"
  productive:
    - "github.com"
    - "stackoverflow.com"
  distracting:
    - "slack"
    - "news.ycombinator.com"
  very_distracting:
    - "reddit.com"
    - "youtube.com"
    - "twitter.com"
